<svg width="680" viewBox="0 0 680 990" role="img" xmlns="http://www.w3.org/2000/svg" height="990" style="background:#ffffff;font-family:Arial,Helvetica,sans-serif;display:block;margin:0 auto">
<title>Pipeline OCR tối ưu cho tài liệu pháp lý tiếng Việt</title>
<desc>Pipeline đa tầng với bypass text-layer sạch, tiered OCR PaddleOCR - Qwen-VL, image-aware correction và eval feedback loop.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── INPUT label ── -->
<text x="340" y="20" text-anchor="middle" font-size="11" fill="#888780" font-weight="600" letter-spacing="0.08em">INPUT</text>

<!-- Input: PDF 2 lớp -->
<rect x="60" y="28" width="170" height="50" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<text x="145" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">PDF 2 lớp</text>
<text x="145" y="66" text-anchor="middle" font-size="11" fill="#5F5E5A">Text layer lỗi / lệch</text>

<!-- Input: PDF 1 lớp -->
<rect x="255" y="28" width="170" height="50" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<text x="340" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">PDF 1 lớp</text>
<text x="340" y="66" text-anchor="middle" font-size="11" fill="#5F5E5A">Scan image-only</text>

<!-- Input: Ảnh / handwriting -->
<rect x="450" y="28" width="170" height="50" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<text x="535" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Ảnh / handwriting</text>
<text x="535" y="66" text-anchor="middle" font-size="11" fill="#5F5E5A">Giấy cũ, viết tay</text>

<!-- connector lines from inputs -->
<line x1="145" y1="78" x2="145" y2="100" stroke="#B4B2A9" stroke-width="1"/>
<line x1="340" y1="78" x2="340" y2="100" stroke="#B4B2A9" stroke-width="1"/>
<line x1="535" y1="78" x2="535" y2="100" stroke="#B4B2A9" stroke-width="1"/>
<line x1="145" y1="100" x2="535" y2="100" stroke="#B4B2A9" stroke-width="1"/>
<line x1="340" y1="100" x2="340" y2="118" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── BƯỚC 1: Triage label ── -->
<text x="340" y="132" text-anchor="middle" font-size="11" fill="#888780" font-weight="600" letter-spacing="0.08em">BƯỚC 1 — TRIAGE</text>

<!-- Triage box: purple -->
<rect x="160" y="140" width="360" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.2"/>
<text x="340" y="161" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">Cache check + text layer quality</text>
<text x="340" y="180" text-anchor="middle" font-size="11" fill="#534AB7">Hash skip · weird char ratio · dict match score</text>

<line x1="340" y1="196" x2="340" y2="218" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Decision diamond -->
<polygon points="340,218 412,252 340,286 268,252" fill="#F1EFE8" stroke="#888780" stroke-width="1.2"/>
<text x="340" y="247" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Text layer</text>
<text x="340" y="264" text-anchor="middle" font-size="11" fill="#5F5E5A">sạch?</text>

<!-- YES → green left -->
<line x1="268" y1="252" x2="243" y2="252" stroke="#0F6E56" stroke-width="1.4" marker-end="url(#arrow)"/>
<text x="255" y="244" text-anchor="middle" font-size="11" fill="#0F6E56" font-weight="600">có</text>
<rect x="60" y="226" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.2"/>
<text x="150" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Extract + rebuild bbox</text>
<text x="150" y="266" text-anchor="middle" font-size="11" fill="#0F6E56">PyMuPDF · sort (y, x)</text>

<!-- NO → red right -->
<line x1="412" y1="252" x2="437" y2="252" stroke="#A32D2D" stroke-width="1.4" marker-end="url(#arrow)"/>
<text x="425" y="244" text-anchor="middle" font-size="11" fill="#A32D2D" font-weight="600">không</text>
<rect x="440" y="226" width="180" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
<text x="530" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Render image 300 DPI</text>
<text x="530" y="266" text-anchor="middle" font-size="11" fill="#5F5E5A">PyMuPDF · bỏ text layer</text>

<!-- merge NO branch down -->
<line x1="530" y1="282" x2="530" y2="308" stroke="#B4B2A9" stroke-width="1"/>
<line x1="530" y1="308" x2="340" y2="308" stroke="#B4B2A9" stroke-width="1"/>
<line x1="340" y1="308" x2="340" y2="326" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── BƯỚC 2: Preprocess label ── -->
<text x="340" y="340" text-anchor="middle" font-size="11" fill="#888780" font-weight="600" letter-spacing="0.08em">BƯỚC 2 — PREPROCESS</text>

<!-- Preprocess box: neutral -->
<rect x="160" y="348" width="360" height="50" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<text x="340" y="368" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Chuẩn hóa ảnh</text>
<text x="340" y="386" text-anchor="middle" font-size="11" fill="#5F5E5A">Grayscale · denoise · deskew · threshold nhẹ</text>

<line x1="340" y1="398" x2="340" y2="416" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── BƯỚC 3: Layout label ── -->
<text x="340" y="430" text-anchor="middle" font-size="11" fill="#888780" font-weight="600" letter-spacing="0.08em">BƯỚC 3 — LAYOUT DETECTION</text>

<!-- Layout box: blue -->
<rect x="160" y="438" width="360" height="50" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.2"/>
<text x="340" y="458" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">PaddleOCR — layout + detect dòng</text>
<text x="340" y="476" text-anchor="middle" font-size="11" fill="#185FA5">Crop từng dòng · bounding box · confidence score</text>

<line x1="340" y1="488" x2="340" y2="506" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── BƯỚC 4: OCR tiered ── -->
<text x="340" y="520" text-anchor="middle" font-size="11" fill="#888780" font-weight="600" letter-spacing="0.08em">BƯỚC 4 — TIERED OCR</text>

<!-- Decision diamond -->
<polygon points="340,528 412,562 340,596 268,562" fill="#F1EFE8" stroke="#888780" stroke-width="1.2"/>
<text x="340" y="557" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Confidence</text>
<text x="340" y="574" text-anchor="middle" font-size="11" fill="#5F5E5A">đủ rõ?</text>

<!-- rõ → green left: LightOneOCR2-1B tier 1 -->
<line x1="268" y1="562" x2="243" y2="562" stroke="#0F6E56" stroke-width="1.4" marker-end="url(#arrow)"/>
<text x="255" y="554" text-anchor="middle" font-size="11" fill="#0F6E56" font-weight="600">rõ</text>
<rect x="60" y="536" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.2"/>
<text x="150" y="558" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">LightOneOCR2-1B · tier 1</text>
<text x="150" y="576" text-anchor="middle" font-size="11" fill="#0F6E56">Text đánh máy · ~0.3s/dòng</text>

<!-- khó → amber right: Qwen tier 2 -->
<line x1="412" y1="562" x2="437" y2="562" stroke="#854F0B" stroke-width="1.4" marker-end="url(#arrow)"/>
<text x="425" y="554" text-anchor="middle" font-size="11" fill="#854F0B" font-weight="600">khó</text>
<rect x="440" y="536" width="180" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.2"/>
<text x="530" y="558" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">Qwen-VL · tier 2</text>
<text x="530" y="576" text-anchor="middle" font-size="11" fill="#854F0B">Batch crop · dict · retry ≤2</text>

<!-- Qwen correction box below tier 2 -->
<line x1="530" y1="592" x2="530" y2="612" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="440" y="612" width="180" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1.2"/>
<text x="530" y="634" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">Image-aware correction</text>
<text x="530" y="652" text-anchor="middle" font-size="11" fill="#854F0B">Qwen: ảnh + text → fix</text>

<!-- merge both paths down -->
<line x1="150" y1="592" x2="150" y2="694" stroke="#B4B2A9" stroke-width="1"/>
<line x1="530" y1="668" x2="530" y2="694" stroke="#B4B2A9" stroke-width="1"/>
<line x1="150" y1="694" x2="530" y2="694" stroke="#B4B2A9" stroke-width="1"/>
<line x1="340" y1="694" x2="340" y2="712" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)"/>

<!-- bypass path (text-layer sạch → skip thẳng xuống normalize) -->
<path d="M 60 258 L 30 258 L 30 730 L 158 730" fill="none" stroke="#1D9E75" stroke-width="1.2" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
<text x="18" y="500" text-anchor="middle" font-size="11" fill="#0F6E56" font-weight="600" transform="rotate(-90,18,500)">bypass</text>

<!-- ── BƯỚC 5: Normalize ── -->
<text x="340" y="726" text-anchor="middle" font-size="11" fill="#888780" font-weight="600" letter-spacing="0.08em">BƯỚC 5 — NORMALIZE + VALIDATE</text>

<rect x="160" y="734" width="360" height="56" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<text x="340" y="756" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Rule-based normalize</text>
<text x="340" y="774" text-anchor="middle" font-size="11" fill="#5F5E5A">Regex · dict địa danh · check line count vs layout</text>

<line x1="340" y1="790" x2="340" y2="808" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── OUTPUT label ── -->
<text x="340" y="822" text-anchor="middle" font-size="11" fill="#888780" font-weight="600" letter-spacing="0.08em">OUTPUT</text>

<!-- Output: JSON -->
<rect x="160" y="830" width="170" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1.2"/>
<text x="245" y="852" text-anchor="middle" font-size="13" font-weight="600" fill="#173404">JSON / text</text>
<text x="245" y="870" text-anchor="middle" font-size="11" fill="#3B6D11">Chunk → Qdrant</text>

<!-- Output: Eval -->
<rect x="350" y="830" width="170" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.2"/>
<text x="435" y="852" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">Eval vs ground truth</text>
<text x="435" y="870" text-anchor="middle" font-size="11" fill="#534AB7">CER/WER · 20-30 trang</text>

<line x1="340" y1="808" x2="245" y2="808" stroke="#B4B2A9" stroke-width="1"/>
<line x1="245" y1="808" x2="245" y2="830" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="808" x2="435" y2="808" stroke="#B4B2A9" stroke-width="1"/>
<line x1="435" y1="808" x2="435" y2="830" stroke="#B4B2A9" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Eval feedback loop → back to triage -->
<path d="M 520 858 L 655 858 L 655 168 L 523 168" fill="none" stroke="#7F77DD" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="668" y="520" text-anchor="middle" font-size="11" fill="#534AB7" font-weight="600" transform="rotate(90,668,520)">feedback loop</text>

<!-- ── LEGEND ── -->
<rect x="40" y="910" width="600" height="68" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>

<rect x="60" y="922" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
<text x="78" y="933" font-size="11" fill="#2C2C2A">Fast path</text>

<rect x="175" y="922" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text x="193" y="933" font-size="11" fill="#2C2C2A">Qwen heavy path</text>

<rect x="320" y="922" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
<text x="338" y="933" font-size="11" fill="#2C2C2A">Phân tích / eval</text>

<rect x="460" y="922" width="12" height="12" rx="3" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<text x="478" y="933" font-size="11" fill="#2C2C2A">Structural / neutral</text>

<line x1="60" y1="956" x2="84" y2="956" stroke="#1D9E75" stroke-width="1.2" stroke-dasharray="6 3"/>
<text x="92" y="960" font-size="11" fill="#2C2C2A">Bypass</text>

<line x1="175" y1="956" x2="199" y2="956" stroke="#7F77DD" stroke-width="1.2" stroke-dasharray="5 3"/>
<text x="207" y="960" font-size="11" fill="#2C2C2A">Eval feedback</text>

<line x1="320" y1="956" x2="344" y2="956" stroke="#A32D2D" stroke-width="1.2"/>
<text x="352" y="960" font-size="11" fill="#2C2C2A">Không / reject</text>
</svg>
